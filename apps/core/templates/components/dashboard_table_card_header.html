<div class="dashboard-table-card-header mb-5 flex flex-wrap items-center justify-between gap-4">
    <div>
        <h3 class="text-2xl font-bold tracking-tight text-slate-900">{{ title }}</h3>
        {% if description %}
        <p class="mt-1 text-sm text-slate-500">{{ description }}</p>
        {% endif %}
    </div>
    {% if action_url and action_label %}
    <a href="{{ action_url }}" class="btn-secondary">{{ action_label }}</a>
    {% endif %}
</div>
