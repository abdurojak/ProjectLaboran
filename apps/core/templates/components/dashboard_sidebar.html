<div class="h-fit w-[86px] shrink-0 transition-all duration-200 xl:w-[260px]" data-dashboard-sidebar-shell>
<aside id="dashboard-sidebar" class="fixed inset-y-0 left-0 z-40 flex h-screen w-[86px] flex-col border-r border-slate-200 bg-white shadow-soft transition-all duration-200 xl:w-[260px]" data-dashboard-sidebar>
    <div class="flex min-h-[88px] items-center justify-center border-b border-slate-200 bg-white px-3 xl:justify-end">
        <button id="dashboard-sidebar-toggle" type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white p-0 text-brand-800 shadow-sm transition hover:bg-white" aria-label="Tutup menu dashboard" title="Tutup menu" aria-expanded="true">
            <i data-sidebar-toggle-icon data-lucide="panel-left-close" class="h-5 w-5"></i>
        </button>
    </div>

    <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain p-3">
        <nav class="grid gap-2">
            {% for link in sidebar_links %}
                {% if link.url %}
                <a href="{% url link.url %}" class="{% if link.active %}bg-brand-50 text-brand-800{% else %}text-slate-700 hover:bg-slate-50{% endif %} flex items-center gap-4 rounded-2xl px-3 py-3 font-semibold transition" title="{{ link.title }}">
                    <span class="{{ link.icon_bg }} {{ link.icon_text }} flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl">
                        <i data-lucide="{{ link.icon }}" class="h-5 w-5"></i>
                    </span>
                    <span data-sidebar-label class="hidden min-w-0 truncate xl:inline">{{ link.title }}</span>
                </a>
                {% else %}
                <div class="flex items-center gap-4 rounded-2xl px-3 py-3 text-slate-500" title="{{ link.title }}">
                    <span class="{{ link.icon_bg }} {{ link.icon_text }} flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl">
                        <i data-lucide="{{ link.icon }}" class="h-5 w-5"></i>
                    </span>
                    <span data-sidebar-label class="hidden min-w-0 truncate xl:inline">{{ link.title }}</span>
                </div>
                {% endif %}
            {% endfor %}
        </nav>

        <div data-sidebar-profile class="mt-6 hidden rounded-[24px] border border-slate-200 bg-gradient-to-b from-white to-brand-50/40 p-5 xl:block">
            <div class="text-sm font-medium text-slate-500">{{ today|date:"l, d F Y" }}</div>
            <p class="mt-8 text-sm text-slate-500">Selamat datang,</p>
            <p class="text-xl font-bold text-brand-800">Lab Admin</p>
            <div class="mt-6 flex h-20 w-20 items-center justify-center rounded-[28px] bg-brand-100 text-brand-800">
                <i data-lucide="flask-conical" class="h-10 w-10"></i>
            </div>
        </div>
    </div>
</aside>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const sidebar = document.querySelector('[data-dashboard-sidebar]');
        const toggle = document.getElementById('dashboard-sidebar-toggle');

        if (!sidebar || !toggle) {
            return;
        }

        const labels = sidebar.querySelectorAll('[data-sidebar-label]');
        const profile = sidebar.querySelector('[data-sidebar-profile]');
        const shell = sidebar.closest('[data-dashboard-sidebar-shell]');
        const header = document.querySelector('body > header');
        const desktopQuery = window.matchMedia('(min-width: 1280px)');

        function setToggleIcon(iconName) {
            toggle.innerHTML = '<i data-sidebar-toggle-icon data-lucide="' + iconName + '" class="h-5 w-5"></i>';
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        function setCollapsed(collapsed) {
            sidebar.classList.toggle('w-[300px]', !collapsed);
            sidebar.classList.toggle('w-[86px]', collapsed);
            sidebar.classList.toggle('xl:w-[260px]', !collapsed);
            sidebar.classList.toggle('xl:w-[86px]', collapsed);
            if (shell) {
                shell.classList.toggle('w-[300px]', !collapsed);
                shell.classList.toggle('w-[86px]', collapsed);
                shell.classList.toggle('xl:w-[260px]', !collapsed);
                shell.classList.toggle('xl:w-[86px]', collapsed);
            }

            if (header) {
                const sidebarWidth = collapsed ? '86px' : (desktopQuery.matches ? '260px' : '300px');
                header.style.marginLeft = sidebarWidth;
                header.style.width = 'calc(100% - ' + sidebarWidth + ')';
            }

            toggle.setAttribute('aria-expanded', String(!collapsed));
            toggle.setAttribute('aria-label', collapsed ? 'Buka menu dashboard' : 'Tutup menu dashboard');
            toggle.setAttribute('title', collapsed ? 'Buka menu' : 'Tutup menu');

            labels.forEach(function (label) {
                label.classList.toggle('hidden', collapsed);
                label.classList.toggle('inline', !collapsed);
                label.classList.toggle('xl:inline', !collapsed);
                label.classList.toggle('xl:hidden', collapsed);
            });

            if (profile) {
                profile.classList.toggle('hidden', collapsed);
                profile.classList.toggle('block', !collapsed);
                profile.classList.toggle('xl:block', !collapsed);
                profile.classList.toggle('xl:hidden', collapsed);
            }

            setToggleIcon(collapsed ? 'menu' : 'x');
        }

        setCollapsed(!desktopQuery.matches);

        toggle.addEventListener('click', function () {
            const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
            setCollapsed(isExpanded);
        });

        desktopQuery.addEventListener('change', function (event) {
            setCollapsed(!event.matches);
        });
    });
</script>
