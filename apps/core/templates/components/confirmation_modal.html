<div data-confirmation-component data-confirmation-modal class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/40 px-4 py-6">
    <div class="w-full max-w-md rounded-[28px] border border-slate-200 bg-white p-6 shadow-soft">
        <div class="flex items-start gap-4">
            <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-rose-50 text-rose-600">
                <i data-lucide="circle-alert" class="h-6 w-6"></i>
            </div>
            <div class="min-w-0">
                <h3 class="text-xl font-black tracking-tight text-slate-900">{{ title|default:"Konfirmasi Aksi" }}</h3>
                <p data-confirmation-message-text class="mt-2 text-sm leading-6 text-slate-600">
                    {{ message|default:"Yakin ingin melanjutkan aksi ini?" }}
                </p>
            </div>
        </div>

        <div class="mt-6 flex flex-wrap justify-end gap-3">
            <button type="button" data-confirmation-cancel class="btn-secondary gap-2">
                <i data-lucide="x" class="h-4 w-4"></i>
                <span>{{ cancel_label|default:"Batal" }}</span>
            </button>
            <button type="button" data-confirmation-confirm class="inline-flex items-center justify-center gap-2 rounded-2xl bg-rose-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-rose-700">
                <i data-lucide="{{ confirm_icon|default:'check' }}" class="h-4 w-4"></i>
                <span>{{ confirm_label|default:"Ya, Lanjutkan" }}</span>
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const modal = document.querySelector('[data-confirmation-modal]');
        if (!modal) {
            return;
        }

        const messageText = modal.querySelector('[data-confirmation-message-text]');
        const cancelButton = modal.querySelector('[data-confirmation-cancel]');
        const confirmButton = modal.querySelector('[data-confirmation-confirm]');
        let pendingElement = null;

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            pendingElement = null;
        }

        function openModal(element) {
            pendingElement = element;
            if (messageText) {
                messageText.textContent = element.dataset.confirmMessage || 'Yakin ingin melanjutkan aksi ini?';
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        document.querySelectorAll('[data-confirm-message]').forEach(function (element) {
            element.addEventListener(element.tagName === 'FORM' ? 'submit' : 'click', function (event) {
                if (element.dataset.confirmed === 'true') {
                    element.dataset.confirmed = 'false';
                    return;
                }

                event.preventDefault();
                openModal(element);
            });
        });

        cancelButton.addEventListener('click', closeModal);
        modal.addEventListener('click', function (event) {
            if (event.target === modal) {
                closeModal();
            }
        });

        confirmButton.addEventListener('click', function () {
            if (!pendingElement) {
                closeModal();
                return;
            }

            pendingElement.dataset.confirmed = 'true';
            if (pendingElement.tagName === 'FORM') {
                pendingElement.requestSubmit();
                return;
            }

            window.location.href = pendingElement.href;
        });
    });
</script>
