{% extends "base.html" %}

{% block title %}Hapus Rekap Honor{% endblock %}

{% block content %}
<section class="mx-auto max-w-xl space-y-6">
    <div class="surface-card p-6 md:p-8">
        <p class="text-sm font-bold uppercase tracking-[0.2em] text-rose-600">Konfirmasi</p>
        <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Hapus Rekap Honor?</h2>
        <p class="mt-3 text-sm leading-7 text-slate-500">
            Yakin ingin menghapus rekap honor <strong>{{ honor.asleb.nama }}</strong> periode <strong>{{ honor.bulan|date:"F Y" }}</strong>?
        </p>
        <form method="post" class="mt-6 flex flex-wrap gap-3">
            {% csrf_token %}
            <button type="submit" class="btn-primary bg-rose-600 hover:bg-rose-700 shadow-rose-900/20">
                <i data-lucide="trash-2" class="h-4 w-4"></i>
                <span>Hapus</span>
            </button>
            <a class="btn-secondary" href="{% url 'asleb:honor_list' %}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>
                <span>Batal</span>
            </a>
        </form>
    </div>
</section>
{% endblock %}
