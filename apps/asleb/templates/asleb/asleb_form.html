{% extends "base.html" %}

{% block title %}Form Data Asleb{% endblock %}

{% block content %}
<section class="mx-auto max-w-4xl space-y-6">
    <div>
        <p class="text-sm font-bold uppercase tracking-[0.2em] text-emerald-700">Asleb</p>
        <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Form Data Asleb</h2>
        <p class="mt-2 text-sm text-slate-500">Isi data asisten laboratorium untuk kebutuhan operasional praktikum.</p>
    </div>

    <form method="post" class="surface-card space-y-5 p-6 md:p-8">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn-primary bg-emerald-600 hover:bg-emerald-700 shadow-emerald-700/20">
                <i data-lucide="save" class="h-4 w-4"></i>
                <span>Simpan</span>
            </button>
            <a class="btn-secondary" href="{% url 'asleb:asleb_list' %}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>
                <span>Batal</span>
            </a>
        </div>
    </form>
</section>
{% endblock %}
