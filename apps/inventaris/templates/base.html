<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Project Laboran{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f6f7f9; color: #20242a; }
        header { background: #155e75; color: white; padding: 16px 32px; }
        main { max-width: 980px; margin: 32px auto; padding: 0 20px; }
        a { color: #0f6b80; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border-bottom: 1px solid #e3e6ea; padding: 12px; text-align: left; }
        th { background: #eef3f6; }
        form { background: white; padding: 20px; border: 1px solid #e3e6ea; }
        label { display: block; font-weight: 600; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
        button, .button { display: inline-block; border: 0; background: #155e75; color: white; padding: 10px 14px; margin-top: 16px; cursor: pointer; }
        .button.secondary { background: #5f6b76; }
        .actions a { margin-right: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Project Laboran</h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
