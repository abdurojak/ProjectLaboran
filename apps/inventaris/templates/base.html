<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Project Laboran{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eefcfb',
                            100: '#d5f5f3',
                            200: '#afebe8',
                            300: '#79d9d7',
                            400: '#42c0c4',
                            500: '#20a4ab',
                            600: '#13838c',
                            700: '#116971',
                            800: '#11545b',
                            900: '#11474d'
                        }
                    },
                    boxShadow: {
                        soft: '0 18px 45px rgba(17, 71, 77, 0.10)'
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-slate-100 text-slate-800 antialiased;
            }
            label {
                @apply mb-2 block text-sm font-semibold text-slate-700;
            }
            input, select, textarea {
                @apply w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700 shadow-sm outline-none transition focus:border-brand-400 focus:ring-4 focus:ring-brand-100;
            }
            textarea {
                @apply min-h-32;
            }
            table {
                @apply w-full border-collapse;
            }
            th {
                @apply border-b border-slate-200 px-5 py-4 text-left text-sm font-semibold text-slate-500;
            }
            td {
                @apply border-b border-slate-100 px-5 py-4 text-sm text-slate-700;
            }
        }

        @layer components {
            .btn-primary {
                @apply inline-flex items-center justify-center rounded-2xl bg-brand-700 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-900/15 transition hover:bg-brand-800;
            }
            .btn-secondary {
                @apply inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50;
            }
            .surface-card {
                @apply rounded-[28px] border border-slate-200 bg-white shadow-soft;
            }
        }
    </style>
</head>
<body>
    <header class="bg-gradient-to-r from-brand-900 via-brand-800 to-brand-700 text-white shadow-lg shadow-brand-900/20">
        <div class="mx-auto flex max-w-[1500px] flex-wrap items-center justify-between gap-5 px-5 py-4 lg:px-7">
            <div class="flex items-center gap-4">
                <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-white/15 text-lg font-black backdrop-blur">
                    PL
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Project Laboran</h1>
                    <p class="text-sm text-white/75">Portal operasional laboratorium sekolah</p>
                </div>
            </div>

            <nav class="flex flex-wrap items-center gap-2 text-sm font-medium">
                <a href="{% url 'dashboard:home' %}" class="rounded-2xl px-4 py-3 text-white/90 transition hover:bg-white/10 hover:text-white">Dashboard</a>
                <a href="#" class="rounded-2xl px-4 py-3 text-white/75 transition hover:bg-white/10 hover:text-white">Kalender</a>
                <a href="#" class="flex items-center gap-2 rounded-2xl px-4 py-3 text-white/75 transition hover:bg-white/10 hover:text-white">
                    <span>Notifikasi</span>
                    <span class="flex h-6 min-w-6 items-center justify-center rounded-full bg-cyan-300/25 px-2 text-xs font-bold text-cyan-100">3</span>
                </a>
            </nav>

            <div class="flex items-center gap-3">
                <div class="flex h-14 w-14 items-center justify-center rounded-full bg-white/15 text-lg font-black backdrop-blur">
                    PL
                </div>
                <div class="hidden sm:block">
                    <div class="font-semibold">Lab Admin</div>
                    <div class="text-sm text-white/75">Administrator</div>
                </div>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-[1500px] px-4 py-6 lg:px-7">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
