{% extends "base.html" %}

{% block title %}Hapus Paket{% endblock %}

{% block content %}
<section class="mx-auto max-w-xl">
    <div class="surface-card p-6 md:p-8">
        <p class="text-sm font-bold uppercase tracking-[0.2em] text-rose-600">Hapus Paket</p>
        <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">{{ paket.nama }}</h2>
        <p class="mt-3 text-sm leading-7 text-slate-500">Gunakan tombol hapus dari daftar paket agar dialog konfirmasi tampil.</p>
        <div class="mt-6">
            <a class="btn-secondary" href="{% url 'inventaris:paket_list' %}">Kembali</a>
        </div>
    </div>
</section>
{% endblock %}
