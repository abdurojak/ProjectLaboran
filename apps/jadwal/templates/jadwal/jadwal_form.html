{% extends "base.html" %}

{% block title %}Form Jadwal Praktikum{% endblock %}

{% block content %}
<section class="mx-auto max-w-4xl space-y-6">
    <div>
        <p class="text-sm font-bold uppercase tracking-[0.2em] text-blue-700">Jadwal</p>
        <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Form Jadwal Praktikum</h2>
        <p class="mt-2 text-sm text-slate-500">Tambahkan jadwal praktikum terpisah dari kalender kegiatan umum.</p>
    </div>
    <form method="post" class="surface-card space-y-5 p-6 md:p-8">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn-primary bg-blue-700 hover:bg-blue-800 shadow-blue-900/15">
                <i data-lucide="save" class="h-4 w-4"></i><span>Simpan</span>
            </button>
            <a class="btn-secondary" href="{% url 'jadwal:jadwal_list' %}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i><span>Batal</span>
            </a>
        </div>
    </form>
</section>
{% endblock %}
