{% extends "base.html" %}

{% block title %}Pendaftaran Terkirim{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl">
    <div class="surface-card p-8 text-center">
        <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-[28px] bg-emerald-50 text-emerald-700">
            <i data-lucide="check-circle-2" class="h-10 w-10"></i>
        </div>
        <h2 class="mt-6 text-3xl font-black tracking-tight text-slate-900">Pendaftaran Terkirim</h2>
        <p class="mt-3 text-sm leading-7 text-slate-500">Terima kasih. Data pendaftaran aslab sudah masuk dan akan dicek oleh admin laboratorium.</p>
        <a href="{% url 'pendaftaran_asleb:pendaftaran_public' %}" class="btn-secondary mt-6">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>
            <span>Kembali ke Form</span>
        </a>
    </div>
</section>
{% endblock %}
